<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Giant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup-body">
  <div class="leaflet-card">
    <div class="leaflet-card-top">
      <span class="leaflet-kicker">You're at</span>
      <span id="leaflet-delta" class="leaflet-delta">+0</span>
    </div>

    <div class="leaflet-score-row">
      <img src="icons/icon48.png" alt="" width="32" height="32" class="leaflet-icon">
      <div class="leaflet-score-wrap">
        <span id="leaflet-score" class="leaflet-score">0</span>
        <span class="leaflet-unit">leaflets</span>
      </div>
    </div>

    <div id="leaflet-playback" class="leaflet-playback">~0hrs greener playback</div>

    <div class="task-section">
      <div class="task-title">Current task:</div>
      <div id="task-pill" class="task-pill idle">
        <span class="task-dot"></span>
        <span id="task-text">Just chilling</span>
        <img id="task-youtube" src="icons/Youtube_icon.png" alt="" class="task-youtube">
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
